<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeHQ</title>
    <link rel="stylesheet" href="Styles/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">AnimeHQ</a>
            
            <div class="nav-menu">
                <a href="/popular" class="nav-link">Popular</a>
                <a href="/top-airing" class="nav-link">Top Airing</a>
            </div>

            <div class="nav-search">
                <input type="text" id="searchInput" class="search-input" placeholder="Search anime..." />
                <button id="searchBtn" class="search-btn">Search</button>
            </div>

            <div class="nav-auth">
                <a href="/signin" class="btn btn-signin">Sign In</a>
                <a href="/signup" class="btn btn-signup">Sign Up</a>
            </div>
        </div>
    </nav>


    <main class="main-content">
    <h1>Welcome to AnimeHQ</h1>
    
    <div id="resultsContainer" class="results-grid"></div>
</main>

    
    <script src="Logic/app.js" defer></script>
</body>
</html>
